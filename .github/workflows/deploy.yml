name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  SERVER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sky-server
  AI_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sky-ai
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-server:
    name: Build sky-server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Package sky-server
        run: mvn -B package -pl sky-server -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push sky-server image
        uses: docker/build-push-action@v6
        with:
          context: ./sky-server
          file: ./sky-server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

  build-ai:
    name: Build sky-ai
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package sky-ai
        run: mvn -B package -pl sky-ai -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push sky-ai image
        uses: docker/build-push-action@v6
        with:
          context: ./sky-ai
          file: ./sky-ai/Dockerfile
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-ai

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SERVER_IMAGE: ${{ env.SERVER_IMAGE }}
          AI_IMAGE: ${{ env.AI_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKY_ALIOSS_ENDPOINT: ${{ secrets.SKY_ALIOSS_ENDPOINT }}
          SKY_ALIOSS_BUCKET_NAME: ${{ secrets.SKY_ALIOSS_BUCKET_NAME }}
          SKY_ALIOSS_ACCESS_KEY_ID: ${{ secrets.SKY_ALIOSS_ACCESS_KEY_ID }}
          SKY_ALIOSS_ACCESS_KEY_SECRET: ${{ secrets.SKY_ALIOSS_ACCESS_KEY_SECRET }}
          SKY_WECHAT_APPID: ${{ secrets.SKY_WECHAT_APPID }}
          SKY_WECHAT_SECRET: ${{ secrets.SKY_WECHAT_SECRET }}
          SKY_BAIDU_AK: ${{ secrets.SKY_BAIDU_AK }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SERVER_IMAGE,AI_IMAGE,IMAGE_TAG,DB_USER,DB_PASSWORD,REDIS_PASSWORD,PG_USER,PG_PASSWORD,OPENAI_API_KEY,SKY_ALIOSS_ENDPOINT,SKY_ALIOSS_BUCKET_NAME,SKY_ALIOSS_ACCESS_KEY_ID,SKY_ALIOSS_ACCESS_KEY_SECRET,SKY_WECHAT_APPID,SKY_WECHAT_SECRET,SKY_BAIDU_AK,SILICONFLOW_API_KEY
          script: |
            set -euo pipefail

            printf '%s' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker network inspect app-net >/dev/null 2>&1 || docker network create app-net

            docker pull "$SERVER_IMAGE:$IMAGE_TAG"
            docker pull "$AI_IMAGE:$IMAGE_TAG"

            docker stop -t 10 business >/dev/null 2>&1 || true
            docker rm business >/dev/null 2>&1 || true
            
            docker stop -t 10 agent >/dev/null 2>&1 || true
            docker rm agent >/dev/null 2>&1 || true

            # sky-server prod config reads SKY_DATASOURCE_*, SKY_REDIS_* and the OSS/WeChat secrets
            # directly from the container environment.
            docker run -d \
              --name business \
              --restart unless-stopped \
              --network app-net \
              -p 8080:8080 \
              -v /etc/localtime:/etc/localtime:ro \
              -v /etc/timezone:/etc/timezone:ro \
              -e TZ=Asia/Shanghai \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_HOST=mysql \
              -e DB_PORT=3306 \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e SKY_DATASOURCE_HOST=mysql \
              -e SKY_DATASOURCE_PORT=3306 \
              -e SKY_DATASOURCE_DATABASE=sky_take_out \
              -e SKY_DATASOURCE_USERNAME="$DB_USER" \
              -e SKY_DATASOURCE_PASSWORD="$DB_PASSWORD" \
              -e SKY_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver \
              -e SKY_REDIS_HOST=redis \
              -e SKY_REDIS_PORT=6379 \
              -e SKY_REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e SKY_REDIS_DATABASE=10 \
              -e SKY_ALIOSS_ENDPOINT="$SKY_ALIOSS_ENDPOINT" \
              -e SKY_ALIOSS_BUCKET_NAME="$SKY_ALIOSS_BUCKET_NAME" \
              -e SKY_ALIOSS_ACCESS_KEY_ID="$SKY_ALIOSS_ACCESS_KEY_ID" \
              -e SKY_ALIOSS_ACCESS_KEY_SECRET="$SKY_ALIOSS_ACCESS_KEY_SECRET" \
              -e SKY_WECHAT_APPID="$SKY_WECHAT_APPID" \
              -e SKY_WECHAT_SECRET="$SKY_WECHAT_SECRET" \
              -e SKY_BAIDU_AK="$SKY_BAIDU_AK" \
              "$SERVER_IMAGE:$IMAGE_TAG"

            # sky-ai needs PostgreSQL, Redis, and the business service on the shared Docker bridge network.
            docker run -d \
              --name agent \
              --restart unless-stopped \
              --network app-net \
              -p 8081:8081 \
              -v /etc/localtime:/etc/localtime:ro \
              -v /etc/timezone:/etc/timezone:ro \
              -e TZ=Asia/Shanghai \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SERVER_PORT=8081 \
              -e BUSINESS_SERVICE_URL=http://business:8080 \
              -e SKY_SERVER_BASE_URL=http://business:8080 \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e SPRING_DATA_REDIS_HOST=redis \
              -e SPRING_DATA_REDIS_PORT=6379 \
              -e SPRING_DATA_REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e PGVECTOR_HOST=pgvector \
              -e PGVECTOR_PORT=5432 \
              -e PG_USER="$PG_USER" \
              -e PG_PASSWORD="$PG_PASSWORD" \
              -e SKY_AI_DATASOURCE_URL=jdbc:postgresql://pgvector:5432/rag_db \
              -e SKY_AI_DATASOURCE_USERNAME="$PG_USER" \
              -e SKY_AI_DATASOURCE_PASSWORD="$PG_PASSWORD" \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://pgvector:5432/rag_db \
              -e SPRING_DATASOURCE_USERNAME="$PG_USER" \
              -e SPRING_DATASOURCE_PASSWORD="$PG_PASSWORD" \
              -e OPENAI_API_KEY="$OPENAI_API_KEY" \
              -e SPRING_AI_OPENAI_API_KEY="$OPENAI_API_KEY" \
              -e SILICONFLOW_API_KEY="$SILICONFLOW_API_KEY" \
              "$AI_IMAGE:$IMAGE_TAG"
            
            echo "Starting image cleanup, keeping top 2 versions..."
            docker images "$SERVER_IMAGE" --format "{{.ID}}" | tail -n +3 | xargs -r docker rmi -f || true
            docker images "$AI_IMAGE" --format "{{.ID}}" | tail -n +3 | xargs -r docker rmi -f || true
            docker image prune -f
            echo "Cleanup completed successfully!"