spring:
  datasource:
    url: ${SKY_AI_DEV_DATASOURCE_URL:jdbc:postgresql://10.67.215.250:5432/rag_db}
    username: ${SKY_AI_DEV_DATASOURCE_USERNAME:postgres}
    password: ${SKY_AI_DEV_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  ai:
    model:
      chat: openai
      embedding: ollama
    openai:
      base-url: ${OPENAI_BASE_URL:http://127.0.0.1:3030}
      api-key: ${OPENAI_API_KEY:temp_key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-5-mini}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        index-type: HNSW
        distance-type: COSINE_DISTANCE

skyai:
  retrieval:
    online:
      top-k: ${SKY_AI_RETRIEVAL_TOP_K:80}
      top-n: ${SKY_AI_RETRIEVAL_TOP_N:8}
      similarity-threshold: ${SKY_AI_RETRIEVAL_SIMILARITY_THRESHOLD:0.7}
      fallback-to-embedding-results-on-rerank-failure: ${SKY_AI_RETRIEVAL_FALLBACK_ON_RERANK_FAILURE:true}
      query-expansion:
        enabled: ${SKY_AI_QUERY_EXPANSION_ENABLED:true}
        max-queries: ${SKY_AI_QUERY_EXPANSION_MAX_QUERIES:2}
        fallback-on-failure: ${SKY_AI_QUERY_EXPANSION_FALLBACK_ON_FAILURE:true}
      keyword:
        enabled: ${SKY_AI_KEYWORD_RETRIEVAL_ENABLED:true}
        top-k: ${SKY_AI_KEYWORD_RETRIEVAL_TOP_K:40}
      fusion:
        max-candidates: ${SKY_AI_RETRIEVAL_FUSION_MAX_CANDIDATES:120}
        rrf-k: ${SKY_AI_RETRIEVAL_FUSION_RRF_K:60}
      siliconflow:
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        api-key: ${SILICONFLOW_API_KEY:}
        model: ${SILICONFLOW_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
