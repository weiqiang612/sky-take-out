server:
  port: ${SERVER_PORT}

spring:
  datasource:
    url: ${SKY_AI_DATASOURCE_URL}
    username: ${SKY_AI_DATASOURCE_USERNAME}
    password: ${SKY_AI_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        index-type: HNSW
        distance-type: COSINE_DISTANCE
skyai:
  retrieval:
    online:
      top-k: ${SKY_AI_RETRIEVAL_TOP_K:80}
      top-n: ${SKY_AI_RETRIEVAL_TOP_N:8}
      similarity-threshold: ${SKY_AI_RETRIEVAL_SIMILARITY_THRESHOLD:0.0}
      fallback-to-embedding-results-on-rerank-failure: ${SKY_AI_RETRIEVAL_FALLBACK_ON_RERANK_FAILURE:true}
      siliconflow:
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        api-key: ${SILICONFLOW_API_KEY:}
        model: ${SILICONFLOW_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
