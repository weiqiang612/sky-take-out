spring:
  datasource:
    url: ${SKY_AI_DATASOURCE_URL}
    username: ${SKY_AI_DATASOURCE_USERNAME}
    password: ${SKY_AI_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      connect-timeout: 5000ms
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 10000ms
  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api}
      api-key: ${OPENAI_API_KEY:temp_key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:deepseek/deepseek-v4-flash}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:baai/bge-m3}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        index-type: HNSW
        distance-type: COSINE_DISTANCE

skyai:
  retrieval:
    online:
      top-k: ${SKY_AI_RETRIEVAL_TOP_K:15} # Embedding retrieval top-k results
      top-n: ${SKY_AI_RETRIEVAL_TOP_N:2} # Reranking top-n results from embedding retrieval
      similarity-threshold: ${SKY_AI_RETRIEVAL_SIMILARITY_THRESHOLD:0.55}
      fallback-to-embedding-results-on-rerank-failure: ${SKY_AI_RETRIEVAL_FALLBACK_ON_RERANK_FAILURE:true}
      query-expansion:
        enabled: ${SKY_AI_QUERY_EXPANSION_ENABLED:false}
        max-queries: ${SKY_AI_QUERY_EXPANSION_MAX_QUERIES:1}
        fallback-on-failure: ${SKY_AI_QUERY_EXPANSION_FALLBACK_ON_FAILURE:true}
      keyword:
        enabled: ${SKY_AI_KEYWORD_RETRIEVAL_ENABLED:true}
        top-k: ${SKY_AI_KEYWORD_RETRIEVAL_TOP_K:10}
      fusion:
        max-candidates: ${SKY_AI_RETRIEVAL_FUSION_MAX_CANDIDATES:30}
        rrf-k: ${SKY_AI_RETRIEVAL_FUSION_RRF_K:60}
      siliconflow:
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        api-key: ${SILICONFLOW_API_KEY:}
        model: ${SILICONFLOW_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
