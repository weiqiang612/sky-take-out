spring:
  application:
    name: sky-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
server:
  port: ${SERVER_PORT:8081}

skyai:
  retrieval:
    online:
      top-k: ${SKY_AI_RETRIEVAL_TOP_K:80}
      top-n: ${SKY_AI_RETRIEVAL_TOP_N:8}
      similarity-threshold: ${SKY_AI_RETRIEVAL_SIMILARITY_THRESHOLD:0.0}
      fallback-to-embedding-results-on-rerank-failure: ${SKY_AI_RETRIEVAL_FALLBACK_ON_RERANK_FAILURE:true}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
        reranker-model: ${OLLAMA_RERANKER_MODEL:bge-reranker-v2-m3:q4_k_m}
      context:
        chunk-separator: ${SKY_AI_RETRIEVAL_CONTEXT_SEPARATOR:\n\n}
        preferred-text-metadata-keys:
          - expandedText
          - parentText
          - parentDocument
          - documentText
