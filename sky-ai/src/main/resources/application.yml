spring:
  application:
    name: sky-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    mcp:
      client:
        sse:
          connections:
            maps-server:
              url: ${MCP_MAPS_URL:}
            payments-server:
              url: ${MCP_PAYMENTS_URL:}
            notifications-server:
              url: ${MCP_NOTIFICATIONS_URL:}
server:
  port: ${SERVER_PORT:8081}
skyai:
  rate-limit:
    requests-per-minute: ${SKY_AI_RATE_LIMIT_REQUESTS:20}
    window-seconds: ${SKY_AI_RATE_LIMIT_WINDOW:60}
  sky-server:
    base-url: ${SKY_SERVER_BASE_URL:http://localhost:8080}
  memory:
    user-profile:
      enabled: ${SKY_AI_USER_PROFILE_ENABLED:true}
      intent-recognition-summary-enabled: ${SKY_AI_USER_PROFILE_INTENT_RECOGNITION_SUMMARY_ENABLED:true}
  retrieval:
    online:
      top-k: ${SKY_AI_RETRIEVAL_TOP_K:80}
      top-n: ${SKY_AI_RETRIEVAL_TOP_N:8}
      similarity-threshold: ${SKY_AI_RETRIEVAL_SIMILARITY_THRESHOLD:0.0}
      fallback-to-embedding-results-on-rerank-failure: ${SKY_AI_RETRIEVAL_FALLBACK_ON_RERANK_FAILURE:true}
      query-expansion:
        enabled: ${SKY_AI_QUERY_EXPANSION_ENABLED:true}
        max-queries: ${SKY_AI_QUERY_EXPANSION_MAX_QUERIES:2}
        fallback-on-failure: ${SKY_AI_QUERY_EXPANSION_FALLBACK_ON_FAILURE:true}
      keyword:
        enabled: ${SKY_AI_KEYWORD_RETRIEVAL_ENABLED:true}
        top-k: ${SKY_AI_KEYWORD_RETRIEVAL_TOP_K:40}
      fusion:
        max-candidates: ${SKY_AI_RETRIEVAL_FUSION_MAX_CANDIDATES:120}
        rrf-k: ${SKY_AI_RETRIEVAL_FUSION_RRF_K:60}
      siliconflow:
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        api-key: ${SILICONFLOW_API_KEY:}
        model: ${SILICONFLOW_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
      context:
        chunk-separator: ${SKY_AI_RETRIEVAL_CONTEXT_SEPARATOR:\n\n}
        preferred-text-metadata-keys:
          - expandedText
          - parentText
          - parentDocument
          - documentText
