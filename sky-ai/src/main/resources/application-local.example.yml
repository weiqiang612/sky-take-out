# Copy this file to application-local.yml for machine-specific overrides.
# application-local.yml is ignored by git.

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/rag_db
    username: postgres
    password: postgres

  ai:
    openai:
      # Set your local relay/base URL if needed.
      base-url: http://127.0.0.1:3030
      # Keep empty if you use a local mock/relay.
      api-key: ""

    ollama:
      base-url: http://127.0.0.1:11434
      embedding:
        options:
          model: bge-m3

skyai:
  retrieval:
    online:
      siliconflow:
        base-url: https://api.siliconflow.cn
        api-key: ""
        model: BAAI/bge-reranker-v2-m3

